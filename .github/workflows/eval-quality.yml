name: Eval Quality

on:
  push:
    branches: ["main", "master"]
  pull_request:

concurrency:
  group: eval-quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  eval:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write
    defaults:
      run:
        working-directory: server

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Restore previous enrich artifact cache
        uses: actions/cache/restore@v4
        with:
          path: |
            server/eval-artifacts/last-enrich-evidence.json
            server/eval-artifacts/last-profile-status.json
          key: enrich-evidence-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            enrich-evidence-${{ github.ref_name }}-
            enrich-evidence-

      - name: Load strict quality profile
        run: npm run eval:profile:export >> "$GITHUB_ENV"

      - name: Run strict quality pipeline
        env:
          ENFORCE_PROFILE_DRIFT_ON_MAIN: "0"
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
        run: npm run eval:ci:strict

      - name: Post PR quality brief comment
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- eval-quality-brief -->';
            const briefPath = 'server/eval-artifacts/pr-summary-brief.md';
            const brief = fs.existsSync(briefPath)
              ? fs.readFileSync(briefPath, 'utf8').trim()
              : 'No PR brief summary generated.';

            const body = `${marker}\n## Eval Quality Brief\n\n${brief}`;
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find((comment) =>
              typeof comment.body === 'string'
              && comment.body.includes(marker)
              && comment.user
              && comment.user.type === 'Bot'
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
              core.info(`Updated PR quality brief comment: ${existing.id}`);
            } else {
              const created = await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
              core.info(`Created PR quality brief comment: ${created.data.id}`);
            }

      - name: Upload eval artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-artifacts
          path: |
            server/eval-artifacts/*.json
            server/eval-artifacts/*.md
          if-no-files-found: warn

      - name: Persist baseline artifacts
        if: always()
        run: npm run eval:baseline:persist

      - name: Save enrich artifact cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            server/eval-artifacts/last-enrich-evidence.json
            server/eval-artifacts/last-profile-status.json
          key: enrich-evidence-${{ github.ref_name }}-${{ github.run_id }}
